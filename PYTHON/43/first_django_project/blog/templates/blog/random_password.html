<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <main class="container">
        <h1>Random Password Generator</h1>

        <div class="mb-3">
            <label for="password" class="form-label">Generated password</label>
            <input id="password" type="text" class="form-control form-control-lg fw-bold border-primary text-primary" value="{{ password }}" readonly style="max-width: 320px;">
        </div>

        <form action="/blog/random-password/" method="get">
            <div class="mb-3" style="max-width: 320px;">
                <label for="length" class="form-label">Password Length</label>
                <input type="number" name="length" class="form-control" id="length" value="{{ length }}">
            </div>

            <div class="mb-3">
                <div class="form-check">
                    <input name="letters" class="form-check-input" type="checkbox" id="letters" checked>
                    <label class="form-check-label" for="letters">
                        Letters [a-zA-Z]
                    </label>
                </div>
                <div class="form-check">
                    <input name="numbers" class="form-check-input" type="checkbox" id="numbers" checked>
                    <label class="form-check-label" for="numbers">
                        Numbers [0-9]
                    </label>
                </div>
                <div class="form-check">
                    <input name="symbols" class="form-check-input" type="checkbox" id="symbols" checked>
                    <label class="form-check-label" for="symbols">
                        Special symbols [$._!-]
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

    </main>

</body>

</html>
